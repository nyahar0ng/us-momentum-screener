name: Daily Performance Tracker

on:
  workflow_dispatch:
    inputs:
      mode:
        description: '実行モード'
        required: true
        default: 'track'
        type: choice
        options:
          - track   # 通常の日次記録
          - setup   # 初回のみ: portfolio.json を生成

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt plotly

      - name: Run setup (初回のみ)
        if: ${{ github.event.inputs.mode == 'setup' }}
        run: python setup.py

      - name: Run tracker (毎日)
        if: ${{ github.event.inputs.mode == 'track' }}
        run: python tracker.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "perf: update $(date +%Y-%m-%d)"
          git push
